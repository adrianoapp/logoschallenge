  { id:"l6", pseudo:"ProphetVoice", totalPts:1650, todayPts:210, highestLevel:3 },
  { id:"l7", pseudo:"WordOfGod", totalPts:950,  todayPts:140, highestLevel:3 },

// ─────────────────────────────────────────────────────────────
// AI QUESTION GENERATOR
// ─────────────────────────────────────────────────────────────
async function generateQuestions(levelId, alreadyAsked = [], count = 5) {
  const avoidList = alreadyAsked.length > 0
    ? `\n\nÉVITE ABSOLUMENT ces sujets déjà posés :\n${alreadyAsked.slice(-30).map((q,i) => `${i+1}. ${q}`).join("\n")}`
    : "";

  const prompt = `Tu es un expert de la Bible. Génère exactement ${count} questions de quiz bibliques originales en français.

Niveau : ${LEVELS[levelId-1].name} — ${LEVEL_PROMPTS[levelId]}${avoidList}

RÈGLES STRICTES :
- Chaque question doit être UNIQUE et différente des précédentes
- 4 options de réponse par question (une seule bonne)
- La bonne réponse doit être clairement correcte et vérifiable dans la Bible
- Les mauvaises réponses doivent être plausibles mais clairement fausses
- Inclure la référence biblique dans l'explication
- Varier les livres bibliques (AT et NT), les thèmes, les personnages

Réponds UNIQUEMENT avec un tableau JSON valide, sans texte avant ou après, sans backticks :
[
  {
    "q": "Texte de la question ?",
    "opts": ["Option A", "Option B", "Option C", "Option D"],
    "a": 0,
    "exp": "Explication avec référence biblique (Livre chapitre:verset).",
    "topic": "sujet court (ex: Genèse, Paul, Miracles...)"
  }
]

L'index "a" est la position de la bonne réponse dans "opts" (0, 1, 2 ou 3).`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  const text = data.content?.map(c => c.text || "").join("").trim();
  // Strip any markdown fences just in case
  const clean = text.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(clean);
  return parsed.map((q, i) => ({ ...q, id: Date.now() + i, level: levelId }));
}

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function timeUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
  const diff = midnight - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function freshDailyProgress() {
  const lp = {};
  LEVELS.forEach(l => { lp[l.id] = { answeredCount: 0, score: 0, done: false }; });
  return { currentLevel: 1, levelProgress: lp, todayTotalScore: 0 };
}

// ─────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────
function LogosChallenge() {
  const [screen, setScreen]       = useState("home");
  const [player, setPlayer]       = useState(null);
  const [dailyProgress, setDailyProgress] = useState(freshDailyProgress());
  const [leaderboard, setLeaderboard]     = useState(INIT_LB);
  const [lbTab, setLbTab]         = useState("today");
  const [pseudo, setPseudo]       = useState("");
  const [countdown, setCountdown] = useState(timeUntilMidnight());

  // Quiz
  const [activeLevel, setActiveLevel] = useState(1);
  const [questions, setQuestions]     = useState([]);      // current batch
  const [askedTopics, setAskedTopics] = useState([]);      // all asked question texts, per session
  const [qIndex, setQIndex]           = useState(0);
  const [selected, setSelected]       = useState(null);
  const [answered, setAnswered]       = useState(false);
  const [streak, setStreak]           = useState(0);
  const [timeLeft, setTimeLeft]       = useState(20);
  const [lastPts, setLastPts]         = useState(0);
  const [loadingQ, setLoadingQ]       = useState(false);   // fetching next batch
  const [loadError, setLoadError]     = useState(null);
  const [prefetched, setPrefetched]   = useState(null);    // next batch ready in background

  const timerRef = useRef(null);

  useEffect(() => {
    const iv = setInterval(() => setCountdown(timeUntilMidnight()), 1000);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (screen === "quiz" && !answered && !loadingQ) {
      timerRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) { clearInterval(timerRef.current); commitAnswer(null); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [screen, qIndex, answered, loadingQ]);

  // ── Prefetch next batch in background while player answers ──
  const prefetchNext = useCallback(async (levelId, asked) => {
    try {
      const batch = await generateQuestions(levelId, asked, 5);
      setPrefetched(batch);
    } catch (e) {
      // silent — will retry on demand
    }
  }, []);

  // ── Start a level ───────────────────────────────────────────
  async function startLevel(levelId) {
    setActiveLevel(levelId);
    setLoadingQ(true);
    setLoadError(null);
    setScreen("quiz");
    setQIndex(0);
    setSelected(null);
    setAnswered(false);
    setStreak(0);
    setTimeLeft(20);
    setLastPts(0);
    setPrefetched(null);
    try {
      const batch = await generateQuestions(levelId, askedTopics, 5);
      const newAsked = [...askedTopics, ...batch.map(q => q.q)];
      setAskedTopics(newAsked);
      setQuestions(batch);
      setLoadingQ(false);
      // Start prefetching next batch immediately
      prefetchNext(levelId, newAsked);
    } catch (e) {
      setLoadError("Impossible de charger les questions. Vérifiez votre connexion.");
      setLoadingQ(false);
    }
  }

  // ── Load next AI batch seamlessly ──────────────────────────
  async function loadNextBatch() {
    setLoadingQ(true);
    setLoadError(null);
    try {
      let batch;
      if (prefetched && prefetched.length > 0) {
        batch = prefetched;
        setPrefetched(null);
      } else {
        batch = await generateQuestions(activeLevel, askedTopics, 5);
      }
      const newAsked = [...askedTopics, ...batch.map(q => q.q)];
      setAskedTopics(newAsked);
      setQuestions(batch);
      setQIndex(0);
      setSelected(null);
      setAnswered(false);
      setTimeLeft(20);
      setLastPts(0);
      setLoadingQ(false);
      prefetchNext(activeLevel, newAsked);
    } catch (e) {
      setLoadError("Erreur de chargement. Réessayez.");
      setLoadingQ(false);
    }
  }

  // ── Answer ──────────────────────────────────────────────────
  function commitAnswer(idx) {
    if (answered || loadingQ) return;
    clearInterval(timerRef.current);
    setSelected(idx);
    setAnswered(true);
    const q = questions[qIndex];
    const isCorrect = idx === q.a;
    let pts = 0;
    if (isCorrect) {
      pts = 10 + timeLeft * 2 + (streak >= 2 ? 5 : 0);
      setStreak(s => s + 1);
    } else {
      setStreak(0);
    }
    setLastPts(pts);
  }

  // ── Next question ───────────────────────────────────────────
  function goNext() {
    const dp = dailyProgress;
    const lp = dp.levelProgress[activeLevel];
    const newAnsweredCount = lp.answeredCount + 1;
    const newLevelScore    = lp.score + lastPts;
    const totalForLevel    = LEVELS[activeLevel - 1].questionsPerDay;
    const levelDone        = newAnsweredCount >= totalForLevel;

    const newLevelProgress = {
      ...dp.levelProgress,
      [activeLevel]: { answeredCount: newAnsweredCount, score: newLevelScore, done: levelDone }
    };
    const newTodayScore    = dp.todayTotalScore + lastPts;
    let newCurrentLevel    = dp.currentLevel;
    if (levelDone && activeLevel === dp.currentLevel && activeLevel < 6) {
      newCurrentLevel = activeLevel + 1;
    }

    const newDp = { ...dp, currentLevel: newCurrentLevel, levelProgress: newLevelProgress, todayTotalScore: newTodayScore };
    setDailyProgress(newDp);

    if (player) {
      setLeaderboard(prev => prev.map(p =>
        p.id === player.id
          ? { ...p, todayPts: newTodayScore, highestLevel: Math.max(p.highestLevel || 1, activeLevel) }
          : p
      ));
    }

    if (levelDone) {
      setScreen("levelComplete");
      return;
    }

    // Move to next question in current batch or load new batch
    if (qIndex + 1 < questions.length) {
      setQIndex(i => i + 1);
      setSelected(null);
      setAnswered(false);
      setTimeLeft(20);
      setLastPts(0);
    } else {
      // End of batch — load next AI batch seamlessly
      loadNextBatch();
    }
  }

  // ── Register ────────────────────────────────────────────────
  function registerPlayer() {
    if (!pseudo.trim()) return;
    const np = { id: "p_" + Date.now(), pseudo: pseudo.trim(), totalPts: 0 };
    setPlayer(np);
    setLeaderboard(prev => [...prev, { ...np, todayPts: 0, highestLevel: 1 }].sort((a,b) => b.totalPts - a.totalPts));
    setScreen("home");
  }

  // ─────────────────────────────────────────────────────────
  // STYLES
  // ─────────────────────────────────────────────────────────
  const gold = "#FFD700";

    nav:   { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 20px", borderBottom:"1px solid rgba(255,255,255,0.06)", background:"rgba(7,7,28,0.97)", position:"sticky", top:0, zIndex:100 },

    pathT: { fontSize:14, fontWeight:700, color:gold },

    pBar:  { height:4, borderRadius:2, background:"rgba(255,255,255,0.07)", marginTop:6, overflow:"hidden" },

    aiBdg: { display:"inline-flex", alignItems:"center", gap:6, background:"rgba(155,127,212,0.12)", border:"1px solid rgba(155,127,212,0.3)", borderRadius:20, padding:"6px 14px", fontSize:12, color:"#C4A6FF", margin:"0 16px 8px" },

    // QUIZ

    errBox:{ background:"rgba(255,107,107,0.1)", border:"1px solid rgba(255,107,107,0.3)", borderRadius:14, padding:"16px", textAlign:"center", marginTop:20 },

    lcCard:{ maxWidth:460, margin:"40px auto", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,215,0,0.18)", borderRadius:22, padding:"34px 22px", textAlign:"center", position:"relative", zIndex:1 },

    lbW:   { margin:"0 16px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:18, padding:"14px" },
    lbTbs: { display:"flex", gap:8, marginBottom:12 },
    lbTb:  { flex:1, padding:"8px", borderRadius:10, border:"1px solid", fontSize:12, cursor:"pointer", fontWeight:700, textAlign:"center", fontFamily:"inherit", transition:"all 0.2s" },
    lbRw:  { display:"flex", alignItems:"center", gap:8, padding:"9px 10px", borderRadius:10, marginBottom:4 },

    regC:  { maxWidth:420, margin:"50px auto", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,215,0,0.18)", borderRadius:22, padding:"34px 22px", textAlign:"center", position:"relative", zIndex:1 },
    inp:   { width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, padding:"13px 16px", color:"#FFF", fontSize:15, outline:"none", fontFamily:"inherit", marginBottom:10 },

    footer:{ textAlign:"center", fontSize:11, color:"#222", padding:"28px 20px 0", fontStyle:"italic" },
  };

  // ─────────────────────────────────────────────────────────
  // REGISTER
  // ─────────────────────────────────────────────────────────
  if (screen === "register") return (
    <div style={S.app}>
      <style>{`*{box-sizing:border-box}@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={S.glow}/>
      <div style={S.regC}>
        <div style={{fontSize:44,marginBottom:10}}>✝️</div>
        <h2 style={{color:gold,marginBottom:6,fontSize:19}}>Rejoindre LogosChallenge</h2>
        <p style={{color:"#666",fontSize:13,marginBottom:20,lineHeight:1.6}}>Créez votre profil pour sauvegarder votre progression et figurer dans le classement mondial</p>
        <input style={S.inp} placeholder="Votre pseudo..." value={pseudo} onChange={e=>setPseudo(e.target.value)} maxLength={20} onKeyDown={e=>e.key==="Enter"&&registerPlayer()}/>

        <button style={S.primB} onClick={registerPlayer}>Commencer l'aventure →</button>
        <button style={S.ghstB} onClick={()=>setScreen("home")}>Retour</button>
      </div>
    </div>
  );

  // ─────────────────────────────────────────────────────────
  // QUIZ
  // ─────────────────────────────────────────────────────────
  if (screen === "quiz") {
    const lvl = LEVELS[activeLevel - 1];
    const answeredSoFar = dailyProgress.levelProgress[activeLevel]?.answeredCount || 0;
    const totalQs = lvl.questionsPerDay;
    const overallPct = (answeredSoFar / totalQs) * 100;
    const timerColor = timeLeft <= 5 ? "#FF6B6B" : timeLeft <= 10 ? gold : "#7EC8A4";

    // Loading screen
    if (loadingQ) return (
      <div style={S.app}>
        <style>{`*{box-sizing:border-box}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}`}</style>
        <div style={S.qWrap}>
          <div style={S.qHead}>
            <button style={S.pausB} onClick={()=>setScreen("home")}>✕ Quitter</button>
            <div style={S.qInfo}>
              <div style={S.qLvl}>{lvl.emoji} Niv.{activeLevel} — {lvl.name}</div>
            </div>
            <div style={{width:44}}/>
          </div>
          <div style={S.prgBg}><div style={{...S.prgFl, width:`${overallPct}%`, background:`linear-gradient(90deg,${lvl.color},${gold})`}}/></div>
          <div style={S.loadWrap}>
            <span style={S.loadIcon}>✝️</span>
            <div style={S.loadTxt}>L'IA génère vos questions...</div>
            <div style={S.loadSub}>Questions uniques et inédites · Niveau {lvl.name}</div>
            <div style={{marginTop:24,display:"flex",justifyContent:"center",gap:8}}>
              {[0,1,2].map(i=>(
                <div key={i} style={{width:8,height:8,borderRadius:"50%",background:gold,animation:`pulse 1.2s ease ${i*0.3}s infinite`}}/>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    // Error screen
    if (loadError) return (
      <div style={S.app}>
        <style>{`*{box-sizing:border-box}`}</style>
        <div style={S.qWrap}>
          <div style={S.qHead}>
            <button style={S.pausB} onClick={()=>setScreen("home")}>← Retour</button>
          </div>
          <div style={S.errBox}>
            <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:700,color:"#FF6B6B",marginBottom:8}}>Erreur de connexion</div>
            <div style={{fontSize:13,color:"#AAA",marginBottom:16}}>{loadError}</div>
            <button style={{...S.primB,width:"auto",display:"inline-block",padding:"10px 24px",margin:0}} onClick={()=>startLevel(activeLevel)}>
              Réessayer
            </button>
          </div>
        </div>
      </div>
    );

    const q = questions[qIndex];
    if (!q) return null;

    return (
      <div style={S.app}>
        <style>{`*{box-sizing:border-box}`}</style>
        <div style={S.qWrap}>
          <div style={S.qHead}>
            <button style={S.pausB} onClick={()=>{ clearInterval(timerRef.current); setScreen("home"); }}>⏸ Pause</button>
            <div style={S.qInfo}>
              <div style={S.qLvl}>{lvl.emoji} Niv.{activeLevel} — {lvl.name}</div>
              <div style={S.qCnt}>{answeredSoFar + qIndex + 1} / {totalQs}</div>
            </div>
            <div style={{...S.tmrB, color:timerColor, borderColor:timerColor}}>{timeLeft}</div>
          </div>

          <div style={S.prgBg}>
            <div style={{...S.prgFl, width:`${overallPct + (qIndex/totalQs*100)}%`, background:`linear-gradient(90deg,${lvl.color},${gold})`}}/>
          </div>

          {/* AI badge */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={S.aiBdg}>✨ Question générée par IA</div>
            {streak >= 2 && <div style={S.strkB}>🔥 Série de {streak} !</div>}
            <div style={S.scLiv}>⭐ {dailyProgress.todayTotalScore} pts</div>
          </div>

          <div style={S.qBox}>
            {q.topic && <div style={S.topic}>📚 {q.topic}</div>}
            <p style={S.qTxt}>{q.q}</p>
          </div>

          <div style={S.opG}>
            {q.opts.map((opt, i) => {
              let bg="rgba(255,255,255,0.04)", border="1px solid rgba(255,255,255,0.08)", color="#CCC";
              if (answered) {
                if (i === q.a)                          { bg="rgba(126,200,164,0.18)"; border="1px solid #7EC8A4"; color="#7EC8A4"; }
                else if (i===selected && selected!==q.a){ bg="rgba(255,107,107,0.18)"; border="1px solid #FF6B6B"; color="#FF6B6B"; }
              }
              return (
                <button key={i} style={{...S.opB, background:bg, border, color}} onClick={()=>!answered&&commitAnswer(i)}>
                  <span style={S.opL}>{["A","B","C","D"][i]}</span>{opt}
                </button>
              );
            })}
          </div>

          {answered && (
            <div style={{...S.expB, borderColor:selected===q.a?"#7EC8A4":"#FF6B6B"}}>
              <span style={{color:selected===q.a?"#7EC8A4":"#FF6B6B", fontWeight:"bold", marginRight:8}}>
                {selected===q.a ? `✓ Correct ! +${lastPts} pts` : "✗ Incorrect"}
              </span>
              {q.exp}
            </div>
          )}

          {answered && (
            <button style={S.nxtB} onClick={goNext}>
              {answeredSoFar + qIndex + 1 >= totalQs
                ? `✅ Niveau ${activeLevel} terminé →`
                : qIndex + 1 >= questions.length
                  ? "✨ Charger nouvelles questions →"
                  : "Question suivante →"}
            </button>
          )}

          <p style={{textAlign:"center", fontSize:11, color:"#333", marginTop:14}}>
            ✨ Questions uniques générées par IA · Aucune répétition possible
          </p>
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────
  // LEVEL COMPLETE
  // ─────────────────────────────────────────────────────────
  if (screen === "levelComplete") {
    const lvl = LEVELS[activeLevel - 1];
    const lp  = dailyProgress.levelProgress[activeLevel];
    const nextLvl = LEVELS[activeLevel];
    return (
      <div style={S.app}>
        <style>{`*{box-sizing:border-box}`}</style>
        <div style={S.glow}/>
        <div style={S.lcCard}>
          <span style={S.lcEmo}>{lvl.emoji}</span>
          <h2 style={S.lcTit}>Niveau {activeLevel} — {lvl.name}<br/>terminé ! 🎉</h2>
          <div style={S.lcStat}>
            <div><span style={S.lcN}>{lp.score}</span><span style={S.lcL}>Points</span></div>
            <div><span style={S.lcN}>{lp.answeredCount}</span><span style={S.lcL}>Questions</span></div>
            <div><span style={S.lcN}>{dailyProgress.todayTotalScore}</span><span style={S.lcL}>Total jour</span></div>
          </div>
          <div style={S.svNot}>✨ Toutes ces questions étaient uniques, générées par IA. Demain vous aurez de nouvelles questions inédites !</div>
          {nextLvl ? (
            <>
              <p style={{fontSize:13,color:"#888",marginBottom:14}}>🔓 <strong style={{color:nextLvl.color}}>{nextLvl.name}</strong> débloqué — {nextLvl.questionsPerDay} nouvelles questions IA vous attendent</p>
              <button style={S.primB} onClick={()=>{ setAskedTopics([]); startLevel(activeLevel+1); }}>
                Continuer → Niv.{activeLevel+1} {nextLvl.emoji}
              </button>
            </>
          ) : (
            <p style={{color:gold, fontWeight:700, fontSize:15, marginBottom:14}}>👑 Vous avez complété TOUS les niveaux du jour !</p>
          )}
          <button style={S.ghstB} onClick={()=>setScreen("home")}>⬅ Retour à l'accueil</button>
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────
  // HOME
  // ─────────────────────────────────────────────────────────
  const dp        = dailyProgress;
  const todayLb   = [...leaderboard].sort((a,b) => b.todayPts  - a.todayPts);
  const totalLb   = [...leaderboard].sort((a,b) => b.totalPts  - a.totalPts);
  const displayLb = lbTab === "today" ? todayLb : totalLb;

  return (
    <div style={S.app}>
      <style>{`*{box-sizing:border-box}@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={S.glow}/>

      <nav style={S.nav}>
        <div style={S.navL}>
          <span style={S.navT}>✝ LogosChallenge</span>
          <span style={S.navS}>Au commencement était le Verbe</span>
        </div>
        {player ? (
          <div style={S.chip}>
            <div style={S.chipN}>{player.pseudo}</div>
            <div style={S.chipS}>⭐ {dp.todayTotalScore} pts aujourd'hui</div>
          </div>
        ) : (
          <button style={S.joinB} onClick={()=>setScreen("register")}>+ Rejoindre</button>
        )}
      </nav>

      {/* AI badge */}
      <div style={{display:"flex", justifyContent:"center", marginTop:16}}>
        <div style={{...S.aiBdg, fontSize:13, padding:"8px 18px"}}>
          ✨ Questions infinies générées par Intelligence Artificielle · Jamais la même question deux fois
        </div>
      </div>

      <div style={S.secT}>📅 Défi du Jour</div>
      <div style={S.pathW}>
        <div style={S.pathH}>
          <span style={S.pathT}>🌅 {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</span>
          <span style={S.cdBdg}>⏰ {countdown}</span>
        </div>

        <div style={S.todS}>
          <span style={S.todN}>{dp.todayTotalScore}</span>
          <span style={S.todL}>points aujourd'hui</span>
        </div>

        {LEVELS.map(lvl => {
          const lp         = dp.levelProgress[lvl.id] || { answeredCount:0, score:0, done:false };
          const isUnlocked = lvl.id <= dp.currentLevel;
          const isDone     = lp.done;
          const isActive   = lvl.id === dp.currentLevel && !isDone;
          const pct        = isDone ? 100 : (lp.answeredCount / lvl.questionsPerDay * 100);

          let borderColor = "rgba(255,255,255,0.05)";
          let bgColor     = "rgba(255,255,255,0.01)";
          let statusColor = "#333";
          let statusText  = "🔒";
          let cursor      = "default";

          if (isDone)      { borderColor=lvl.color+"44"; bgColor=lvl.color+"0d"; statusColor="#7EC8A4"; statusText="✅ Terminé"; }
          else if(isActive){ borderColor=lvl.color+"88"; bgColor=lvl.color+"18"; statusColor=lvl.color; statusText= lp.answeredCount>0?`▶ Reprendre`:"▶ Jouer ✨"; cursor="pointer"; }
          else if(isUnlocked){ borderColor=lvl.color+"33"; statusColor=lvl.color; statusText="Disponible"; cursor="pointer"; }

          return (
            <div key={lvl.id} style={{...S.lvlSt, background:bgColor, borderColor, opacity:isUnlocked?1:0.3, cursor}}
              onClick={()=>{ if(!isUnlocked||isDone) return; if(!player){setScreen("register");return;} startLevel(lvl.id); }}>
              <span style={S.stIco}>{lvl.emoji}</span>
              <div style={S.stInf}>
                <div style={S.stNm}>Niv.{lvl.id} — {lvl.name}</div>
                <div style={S.stSb}>{lvl.desc} · {lvl.questionsPerDay} questions IA · {lp.score} pts</div>
                {isUnlocked && (
                  <div style={S.pBar}>
                    <div style={{...S.pFill, width:`${pct}%`, background:isDone?"#7EC8A4":lvl.color}}/>
                  </div>
                )}
              </div>
              <span style={{...S.stSt, color:statusColor}}>{statusText}</span>
            </div>
          );
        })}

        {!player && (
          <div style={{textAlign:"center",marginTop:14,padding:"14px",background:"rgba(255,215,0,0.04)",border:"1px solid rgba(255,215,0,0.12)",borderRadius:12}}>
            <p style={{fontSize:13,color:"#777",marginBottom:10}}>🙏 Inscrivez-vous pour sauvegarder votre progression !</p>
            <button style={{...S.primB,width:"auto",display:"inline-block",padding:"10px 24px",margin:0}} onClick={()=>setScreen("register")}>Créer mon profil</button>
          </div>
        )}
      </div>

      <div style={S.secT}>🏆 Classement</div>
      <div style={S.lbW}>
        <div style={S.lbTbs}>
          <button onClick={()=>setLbTab("today")} style={{...S.lbTb, background:lbTab==="today"?"rgba(255,215,0,0.1)":"rgba(255,255,255,0.02)", borderColor:lbTab==="today"?gold:"rgba(255,255,255,0.07)", color:lbTab==="today"?gold:"#666"}}>
            📅 Meilleurs du jour
          </button>
          <button onClick={()=>setLbTab("total")} style={{...S.lbTb, background:lbTab==="total"?"rgba(255,215,0,0.1)":"rgba(255,255,255,0.02)", borderColor:lbTab==="total"?gold:"rgba(255,255,255,0.07)", color:lbTab==="total"?gold:"#666"}}>
            🌍 Mondial
          </button>
        </div>
        {displayLb.slice(0,8).map((p,i) => {
          const pts  = lbTab==="today" ? p.todayPts : p.totalPts;
          const isMe = player && p.pseudo === player.pseudo;
          return (
            <div key={p.id} style={{...S.lbRw, background:isMe?"rgba(255,215,0,0.07)":i<3?"rgba(255,255,255,0.03)":"transparent"}}>
              <span style={{...S.lbRk, color:i===0?gold:i===1?"#C0C0C0":i===2?"#CD7F32":"#444"}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
              </span>
              <span style={{flex:1, fontWeight:700, fontSize:13}}>
                {p.pseudo}
                {isMe && <span style={{background:"rgba(255,215,0,0.18)",color:gold,fontSize:9,padding:"1px 5px",borderRadius:6,marginLeft:5}}>vous</span>}
              </span>
              <span style={{fontSize:14}}>{"🌱📖✝️🔥⭐👑"[(p.highestLevel||1)-1]}</span>
              <span style={{fontWeight:700, fontSize:13, color:gold}}>{(pts||0).toLocaleString()} pts</span>
            </div>
          );
        })}
        <p style={{textAlign:"center",fontSize:11,color:"#222",marginTop:10}}>
          {lbTab==="today" ? "Classement du jour · Réinitialisé à minuit" : "Points cumulés à vie · Ne se réinitialisent jamais"}
        </p>
      </div>

      <div style={S.footer}>"Ta parole est une lampe à mes pieds." — Psaume 119:105</div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LogosChallenge />);
  </script>
</body>
</html>
