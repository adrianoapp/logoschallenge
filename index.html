const today = () => new Date().toISOString().split("T")[0];

// Save/update score
async function dbSaveScore(playerId, pseudo, dailyPts, totalPts, currentLevel) {
  const existing = await dbGetScore(playerId);
  const todayStr = today();

  if (!existing) {
    return supaFetch("scores", "POST", {
      player_id: playerId, pseudo,
      daily_points: dailyPts,
      total_points: totalPts,
      current_level: currentLevel,
      last_played: todayStr,
      streak: 1,
      games_played: 1,
      badges: JSON.stringify([]),
      daily_wins: 0,
    });
  }

  const isNewDay = existing.last_played !== todayStr;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yesterdayStr = yesterday.toISOString().split("T")[0];
  const isConsecutive = existing.last_played === yesterdayStr;
  const newStreak = isNewDay ? (isConsecutive ? (existing.streak||0)+1 : 1) : (existing.streak||1);
  const newGamesPlayed = isNewDay ? (existing.games_played||0)+1 : (existing.games_played||1);
  
  // Compute badges
  const stats = { streak: newStreak, totalPoints: totalPts, highestLevel: currentLevel, gamesPlayed: newGamesPlayed };
  const earnedBadges = computeBadges(stats).map(b => b.id);

  return supaFetch(`scores?player_id=eq.${playerId}`, "PATCH", {
    daily_points: dailyPts,
    total_points: totalPts,
    current_level: currentLevel,
    last_played: todayStr,
    streak: newStreak,
    games_played: newGamesPlayed,
    badges: JSON.stringify(earnedBadges),
    updated_at: new Date().toISOString(),
  });
}

// Load leaderboard
async function dbGetLeaderboard() {
  const todayStr = today();
  // Fetch top 20 by DAILY points (only today's players)
  const todayRows = await supaFetch(
    `scores?select=pseudo,daily_points,total_points,current_level,last_played,streak,games_played,badges&last_played=eq.${todayStr}&order=daily_points.desc&limit=20`
  );
  // Fetch top 20 by TOTAL points (all time)
  const totalRows = await supaFetch(
    "scores?select=pseudo,daily_points,total_points,current_level,last_played,streak,games_played,badges&order=total_points.desc&limit=20"
  );
  const mapRow = (r) => ({
    pseudo: r.pseudo,
    todayPts: r.last_played === todayStr ? r.daily_points : 0,
    totalPts: r.total_points,
    highestLevel: r.current_level,
    streak: r.streak || 0,
    gamesPlayed: r.games_played || 0,
    badges: r.badges ? JSON.parse(r.badges) : [],
  });
  return {
    today: (todayRows || []).map(mapRow),
    total: (totalRows || []).map(mapRow),
  };
}

async function dbGetPlayerProgress(playerId) {

  return {
    currentLevel: score.current_level || 1,
    todayTotalScore: isNewDay ? 0 : score.daily_points,
    totalPoints: score.total_points || 0,
    streak: score.streak || 0,
    gamesPlayed: score.games_played || 0,
    badges: score.badges ? JSON.parse(score.badges) : [],
  };
}

function timeUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now); midnight.setHours(24, 0, 0, 0);
  const diff = midnight - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function freshDailyProgress() {
  const lp = {};
  LEVELS.forEach(l => { lp[l.id] = { answeredCount: 0, score: 0, done: false }; });
  return { currentLevel: 1, levelProgress: lp, todayTotalScore: 0, totalPoints: 0 };
}

      const batch = await generateQuestions(levelId, askedTopics, 5, lang);
      const newAsked = [...askedTopics, ...batch.map(q => q.q)];
      setAskedTopics(newAsked);
      setQuestions(batch);
      setLoadingQ(false);
      prefetchNext(levelId, newAsked, lang);
    } catch (e) {
      setLoadError(t.errorMsg);
      setLoadingQ(false);
    }
  }

  async function loadNextBatch() {
    setLoadingQ(true);
    setLoadError(null);
    try {
      let batch;
      if (prefetched && prefetched.length > 0) {
        batch = prefetched;
        setPrefetched(null);
      } else {
        batch = await generateQuestions(activeLevel, askedTopics, 5, lang);
      }
      const newAsked = [...askedTopics, ...batch.map(q => q.q)];
      setAskedTopics(newAsked);
      setQuestions(batch);
      setQIndex(0);
      setSelected(null);
      setAnswered(false);
      setTimeLeft(LEVELS[activeLevel-1].timeLimit);
      setLastPts(0);
      setLoadingQ(false);
      prefetchNext(activeLevel, newAsked, lang);
    } catch (e) {
      setLoadError(t.errorMsg);
      setLoadingQ(false);
    }
  }

  function commitAnswer(idx) {
    if (answered || loadingQ) return;
    clearInterval(timerRef.current);
    setSelected(idx);
    setAnswered(true);
    const q = questions[qIndex];
    const lvlCfg = LEVELS[activeLevel - 1];
    const isCorrect = idx === q.a;
    let pts = 0;
    if (isCorrect) {
      pts = lvlCfg.basePoints + timeLeft * lvlCfg.timeBonus + (streak >= 2 ? lvlCfg.streakBonus : 0);
      setStreak(s => s + 1);
    } else {
      setStreak(0);
    }
    setLastPts(pts);
  }

  async function goNext() {
    const dp = dailyProgress;
    const lp = dp.levelProgress[activeLevel];
    const lvlCfg = LEVELS[activeLevel - 1];
    const newAnsweredCount = lp.answeredCount + 1;
    const newCorrectCount  = (lp.correctCount || 0) + (selected === questions[qIndex]?.a ? 1 : 0);
    const newLevelScore    = lp.score + lastPts;
    const totalForLevel    = lvlCfg.questionsPerDay;
    const levelDone        = newAnsweredCount >= totalForLevel;

    const newLevelProgress = {
      ...dp.levelProgress,
      [activeLevel]: { answeredCount: newAnsweredCount, correctCount: newCorrectCount, score: newLevelScore, done: levelDone }
    };
    const newTodayScore  = dp.todayTotalScore + lastPts;
    const newTotalPoints = (dp.totalPoints || 0) + lastPts;

    // Check pass/fail when level is done
    let passed = false;
    let newCurrentLevel = dp.currentLevel;
    if (levelDone) {
      passed = newCorrectCount >= lvlCfg.minToPass;
      if (passed && activeLevel === dp.currentLevel && activeLevel < 6) {
        newCurrentLevel = activeLevel + 1;
      }
    }

    const newDp = { ...dp, currentLevel: newCurrentLevel, levelProgress: newLevelProgress, todayTotalScore: newTodayScore, totalPoints: newTotalPoints };
    setDailyProgress(newDp);

    // Save to Supabase
    if (player) {
      setSaving(true);
      try {
        await dbSaveScore(player.id, player.pseudo, newTodayScore, newTotalPoints, newCurrentLevel);
        const updatedScore = await dbGetPlayerProgress(player.id);
        if (updatedScore) {
          const oldBadgeIds = playerBadges;
          const newBadgeIds = updatedScore.badges || [];
          const justEarned = newBadgeIds.filter(id => !oldBadgeIds.includes(id));
          if (justEarned.length > 0) {
            const badge = BADGES.find(b => b.id === justEarned[0]);
            if (badge) setNewBadge(badge);
          }
          setPlayerBadges(newBadgeIds);
          setPlayerStreak(updatedScore.streak || 0);
        }
        const lb = await dbGetLeaderboard();
        setLbToday(lb.today || []);
        setLbTotal(lb.total || []);
      } catch(e) {}
      setSaving(false);
    }

    if (levelDone) {
      // Track attempt
      const currentAttempts = (levelAttempts[activeLevel] || 0) + 1;
      setLevelAttempts(prev => ({ ...prev, [activeLevel]: currentAttempts }));
      setScreen(passed ? "levelComplete" : currentAttempts >= 2 ? "levelBlocked" : "levelFailed");
      return;
    }

    if (qIndex + 1 < questions.length) {
      setQIndex(i => i + 1);
      setSelected(null);
      setAnswered(false);
      setTimeLeft(lvlCfg.timeLimit);
      setLastPts(0);
    } else {
      loadNextBatch();
    }
  }

      if (!p) throw new Error("Erreur création joueur");

      // Load existing progress
      const progress = await dbGetPlayerProgress(p.id);
      if (progress) {
        const lp = {};
        LEVELS.forEach(l => { lp[l.id] = { answeredCount: 0, score: 0, done: false }; });
        setDailyProgress({
          currentLevel: progress.currentLevel,
          levelProgress: lp,
          todayTotalScore: progress.todayTotalScore,
          totalPoints: progress.totalPoints,
        });
      }

      setPlayer(p);
      if (progress) {
        setPlayerStreak(progress.streak || 0);
        setPlayerBadges(progress.badges || []);
      }
      // Load referral count
      try {
        const rc = await dbGetReferralCount(p.id);
        setReferralCount(rc);
      } catch(e) {}
      setScreen("home");
    } catch(e) {
      alert("Erreur : " + e.message);
    }

            {!recoverMode ? (
              <>
                <h2 style={{color:gold,marginBottom:6,fontSize:17}}>{t.choosePseudo}</h2>
                <input style={S.inp} placeholder={t.pseudoPlaceholder} value={pseudo}
                  onChange={e=>{setPseudo(e.target.value); setRecoverError("");}}
                  maxLength={20} onKeyDown={e=>e.key==="Enter"&&registerWithGoogle()}/>
                {recoverError && <p style={{color:"#FF4444",fontSize:12,marginTop:-8,marginBottom:8}}>{recoverError}</p>}
                <button className="btn-primary" style={S.primB} onClick={registerWithGoogle}>{t.startAdventure}</button>
                <button style={S.ghstB} onClick={()=>{setRecoverMode(true); setPseudo(""); setRecoverError("");}}>
                  🔄 {t.recoverTitle}
                </button>
              </>
            ) : (
              <>
                <div style={{background:"rgba(99,202,183,0.08)",border:"1px solid rgba(99,202,183,0.2)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#63CAB7",lineHeight:1.6,textAlign:"center"}}>
                  🔄 {lang==="fr"
                    ? "Vous avez déjà joué ? Entrez votre pseudo pour récupérer tous vos points."
                    : "Already played? Enter your username to recover all your points."}
                </div>
                <input style={{...S.inp, borderColor: recoverError ? "#FF4444" : "rgba(255,215,0,0.2)"}}
                  placeholder={t.recoverPseudo} value={pseudo}
                  onChange={e=>{setPseudo(e.target.value); setRecoverError("");}}
                  maxLength={20} onKeyDown={e=>e.key==="Enter"&&registerWithGoogle()}/>
                {recoverError && <p style={{color:"#FF4444",fontSize:12,marginTop:-8,marginBottom:8}}>{recoverError}</p>}
                <button className="btn-primary" style={S.primB} onClick={registerWithGoogle}>{t.recoverBtn}</button>
                <button style={S.ghstB} onClick={()=>{setRecoverMode(false); setPseudo(""); setRecoverError("");}}>
                  ✨ {lang==="fr"?"Je suis nouveau — créer mon pseudo":"I'm new — create my username"}
                </button>
              </>
            )}
          </>
        )}
      </div>
    </div>
  );

  // ─────────────────────────────────────────────────────────
  // QUIZ
  // ─────────────────────────────────────────────────────────
  if (screen === "quiz") {
    const lvl = LEVELS[activeLevel - 1];
    const answeredSoFar = dailyProgress.levelProgress[activeLevel]?.answeredCount || 0;
    const totalQs = lvl.questionsPerDay;
    const overallPct = (answeredSoFar / totalQs) * 100;
    const timerColor = timeLeft <= 5 ? "#FF6B6B" : timeLeft <= 10 ? gold : "#7EC8A4";

    if (loadingQ) return (
      <div style={S.app}>
        <style>{`*{box-sizing:border-box}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}`}</style>
        <div style={S.qWrap}>
          <div style={S.qHead}>
            <button style={S.pausB} onClick={()=>setScreen("home")}>{t.quit}</button>
            <div style={S.qInfo}><div style={S.qLvl}>{lvl.emoji} Niv.{activeLevel} — {lvl.name}</div></div>
            <div style={{width:44}}/>
          </div>
          <div style={S.prgBg}><div style={{...S.prgFl, width:`${overallPct}%`, background:`linear-gradient(90deg,${lvl.color},${gold})`}}/></div>
          <div style={S.loadWrap}>
            <span style={S.loadIcon}>✝️</span>
            <div style={S.loadTxt}>L'IA génère vos questions...</div>
            <div style={S.loadSub}>Questions uniques · Niveau {lvl.name}</div>
            <div style={{marginTop:24,display:"flex",justifyContent:"center",gap:8}}>
              {[0,1,2].map(i=>(
                <div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#63CAB7",animation:`pulse 1.2s ease ${i*0.3}s infinite`}}/>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    if (loadError) return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.qWrap}>
          <div style={S.qHead}><button style={S.pausB} onClick={()=>setScreen("home")}>{t.back}</button></div>
          <div style={S.errBox}>
            <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:700,color:"#FF6B6B",marginBottom:8}}>{t.errorTitle}</div>
            <div style={{fontSize:13,color:"#AAA",marginBottom:16}}>{loadError}</div>
            <button style={{...S.primB,width:"auto",display:"inline-block",padding:"10px 24px",margin:0}} onClick={()=>startLevel(activeLevel)}>{t.retry}</button>
          </div>
        </div>
      </div>
    );

    const q = questions[qIndex];
    if (!q) return null;

    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.qWrap}>
          <div style={S.qHead}>
            <button style={S.pausB} onClick={()=>{ clearInterval(timerRef.current); setScreen("home"); }}>{t.pause}</button>
            <div style={S.qInfo}>
              <div style={S.qLvl}>{lvl.emoji} Niv.{activeLevel} — {lvl.name}</div>
              <div style={S.qCnt}>{answeredSoFar + qIndex + 1} / {totalQs}</div>
            </div>
            <div style={{...S.tmrB, color:timerColor, borderColor:timerColor}}>{timeLeft}</div>
          </div>
          <div style={S.prgBg}>
            <div style={{...S.prgFl, width:`${overallPct + (qIndex/totalQs*100)}%`, background:`linear-gradient(90deg,${lvl.color},${gold})`}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={S.aiBdg}>{t.aiQuestion}</div>
            {streak >= 2 && <div style={S.strkB}>{t.streak} {streak} !</div>}
            <div style={S.scLiv}>⭐ {dailyProgress.todayTotalScore} pts</div>
          </div>
          <div style={S.qBox} className="fade-in">
            {q.topic && <div style={S.topic}>📚 {q.topic}</div>}
            <p style={S.qTxt}>{q.q}</p>
          </div>
          <div style={S.opG} className="slide-up">
            {q.opts.map((opt, i) => {
              let bg="rgba(255,255,255,0.04)", border="1px solid rgba(255,255,255,0.08)", color="#CCC";
              if (answered) {
                if (i === q.a)                           { bg="rgba(126,200,164,0.18)"; border="1px solid #7EC8A4"; color="#7EC8A4"; }
                else if (i===selected && selected!==q.a) { bg="rgba(255,107,107,0.18)"; border="1px solid #FF6B6B"; color="#FF6B6B"; }
              }
              return (
                <button key={i} className="opt-btn" className="opt-btn" style={{...S.opB, background:bg, border, color}} onClick={()=>!answered&&commitAnswer(i)}>
                  <span style={S.opL}>{["A","B","C","D"][i]}</span>{opt}
                </button>
              );
            })}
          </div>
          {answered && (
            <div style={{...S.expB, borderColor:selected===q.a?"#7EC8A4":"#FF6B6B"}}>
              <span style={{color:selected===q.a?"#7EC8A4":"#FF6B6B", fontWeight:"bold", marginRight:8}}>
                {selected===q.a ? `${t.correct}${lastPts} pts` : t.wrong}
              </span>
              {q.exp}
            </div>
          )}
          {answered && (
            <button className="btn-primary" style={S.nxtB} onClick={goNext} disabled={saving}>
              {saving ? t.saving : answeredSoFar + qIndex + 1 >= totalQs
                ? `${t.levelDone} ${activeLevel} ${t.levelDone2}`
                : t.next}
            </button>
          )}
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────
  // LEVEL COMPLETE
  // ─────────────────────────────────────────────────────────
  if (screen === "levelComplete") {
    const lvl = LEVELS[activeLevel - 1];
    const lp  = dailyProgress.levelProgress[activeLevel];
    const nextLvl = LEVELS[activeLevel];
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <div style={S.lcCard} className="pop-in">
          <span style={S.lcEmo}>{lvl.emoji}</span>
          <h2 style={S.lcTit}>Niveau {activeLevel} — {lvl.name}<br/>{lang==="fr" ? "terminé" : "complete"} ! 🎉</h2>
          <div style={S.lcStat}>
            <div><span style={S.lcN}>{lp.correctCount||0}/{LEVELS[activeLevel-1].questionsPerDay}</span><span style={S.lcL}>{t.correctAnswers}</span></div>
            <div><span style={S.lcN}>{lp.score}</span><span style={S.lcL}>{t.levelPoints}</span></div>
            <div><span style={S.lcN}>{dailyProgress.todayTotalScore}</span><span style={S.lcL}>{t.totalDay}</span></div>
          </div>
          <div style={S.svNot}>🎉 {lp.correctCount||0}/{LEVELS[activeLevel-1].questionsPerDay} bonnes réponses — Niveau validé ! ✅ Score sauvegardé.</div>
          {nextLvl ? (
            <>
              <p style={{fontSize:13,color:"#888",marginBottom:14}}>🔓 <strong style={{color:nextLvl.color}}>{nextLvl.name}</strong> {t.unlocked}</p>
              <button className="btn-primary" style={S.primB} onClick={()=>{ setAskedTopics([]); startLevel(activeLevel+1); }}>
                Continuer → Niv.{activeLevel+1} {nextLvl.emoji}
              </button>
            </>
          ) : (
            <p style={{color:gold, fontWeight:700, fontSize:15, marginBottom:14}}>👑 Vous avez complété TOUS les niveaux !</p>
          )}
          <button style={S.ghstB} onClick={()=>setScreen("home")}>{t.backHome}</button>
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────
  // LEVEL FAILED — 1st attempt, can retry
  // ─────────────────────────────────────────────────────────
  if (screen === "levelFailed") {
    const lvl = LEVELS[activeLevel - 1];
    const lp  = dailyProgress.levelProgress[activeLevel];
    const correct = lp?.correctCount || 0;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <div style={S.lcCard}>
          <span style={{fontSize:52, marginBottom:12, display:"block"}}>😔</span>
          <h2 style={{...S.lcTit, color:"#FF6B6B"}}>Niveau {activeLevel} — {lvl.name}<br/>pas encore validé</h2>
          <div style={S.lcStat}>
            <div><span style={S.lcN}>{correct}</span><span style={S.lcL}>{t.correctAnswers}</span></div>
            <div><span style={S.lcN}>{lvl.minToPass}</span><span style={S.lcL}>Minimum requis</span></div>
            <div><span style={S.lcN}>{lp?.score || 0}</span><span style={S.lcL}>Points gagnés</span></div>
          </div>
          <div style={{...S.svNot, borderColor:"rgba(255,107,107,0.3)", background:"rgba(255,107,107,0.07)", color:"#FFB3B3", marginBottom:18}}>
            {t.retryMsg1} {LEVELS[activeLevel-1].minToPass - correct} {LEVELS[activeLevel-1].minToPass - correct > 1 ? t.retryMsg3 : t.retryMsg2}. {t.retryMsg4}
          </div>
          <button className="btn-primary" style={S.primB} onClick={()=>{ 
            setDailyProgress(prev => ({...prev, levelProgress: {...prev.levelProgress, [activeLevel]: {answeredCount:0, correctCount:0, score:0, done:false}}}));
            setAskedTopics([]);
            startLevel(activeLevel); 
          }}>
            {t.retryNow}
          </button>
          <button style={S.ghstB} onClick={()=>setScreen("home")}>{t.backHome}</button>
        </div>
      </div>
    );
  }

  // LEVEL BLOCKED — 2nd attempt failed, come back tomorrow
  // ─────────────────────────────────────────────────────────
  if (screen === "levelBlocked") {
    const lvl = LEVELS[activeLevel - 1];
    const lp  = dailyProgress.levelProgress[activeLevel];
    const correct = lp?.correctCount || 0;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <div style={S.lcCard}>
          <span style={{fontSize:52, marginBottom:12, display:"block"}}>🔒</span>
          <h2 style={{...S.lcTit, color:"#888"}}>{lang==="fr" ? "Niveau" : "Level"} {activeLevel} {t.blockedTitle}</h2>
          <div style={S.lcStat}>
            <div><span style={S.lcN}>{correct}</span><span style={S.lcL}>{t.correctAnswers}</span></div>
            <div><span style={S.lcN}>{lvl.minToPass}</span><span style={S.lcL}>Minimum requis</span></div>
            <div><span style={S.lcN}>{lp?.score || 0}</span><span style={S.lcL}>Points gagnés</span></div>
          </div>
          <div style={{...S.svNot, borderColor:"rgba(255,215,0,0.2)", background:"rgba(255,215,0,0.04)", color:"#AAA", marginBottom:18}}>
            {t.blockedMsg}
          </div>
          <button className="btn-primary" style={S.primB} onClick={()=>setScreen("home")}>{t.backHome}</button>
        </div>
      </div>
    );
  }

  // SHARE SCREEN
  // ─────────────────────────────────────────────────────────
  if (showShare) {
    const shareLink = `https://logoschallenge.vercel.app${player ? "?ref="+encodeURIComponent(player.pseudo) : ""}`;
    const whatsappMsg = encodeURIComponent(t.waMsg(shareLink));
    const whatsappUrl = `https://wa.me/?text=${whatsappMsg}`;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <nav style={S.nav}>
          <button style={{background:"none",border:"none",color:gold,fontSize:16,cursor:"pointer",fontFamily:"inherit",padding:"8px 0"}} onClick={()=>setShowShare(false)}>{t.back}</button>
          <span style={{...S.navT, fontSize:15}}>{t.shareTitle}</span>
          <div style={{width:60}}/>
        </nav>
        <div style={{padding:"20px 16px"}}>

          {/* Stats parrainage */}
          <div style={{textAlign:"center", marginBottom:24, background:"rgba(255,215,0,0.05)", border:"1px solid rgba(255,215,0,0.2)", borderRadius:18, padding:"24px 16px"}}>
            <div style={{fontSize:52, marginBottom:8}}>🤝</div>
            <div style={{fontSize:13, color:gold, letterSpacing:2, textTransform:"uppercase", marginBottom:6}}>Ton impact</div>
            <div style={{fontSize:48, fontWeight:700, color:gold}}>{referralCount}</div>
            <div style={{fontSize:13, color:"#888", marginBottom:12}}>
              {referralCount === 0 ? t.noInvite : referralCount === 1 ? t.oneInvite : t.manyInvites}
            </div>
            <div style={{fontSize:13, color:"#7EC8A4", fontWeight:700}}>
              +{referralCount * 10} pts bonus gagnés 💰
            </div>
          </div>

          {/* Lien unique */}
          <div style={{background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:"16px", marginBottom:16}}>
            <div style={{fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:8}}>Ton lien unique</div>
            <div style={{fontFamily:"monospace", fontSize:12, color:"#C4A6FF", wordBreak:"break-all", marginBottom:12, background:"rgba(155,127,212,0.08)", padding:"10px 12px", borderRadius:10}}>
              {shareLink}
            </div>
            <button style={{...S.ghstB, marginBottom:0, fontSize:12}} onClick={()=>{navigator.clipboard.writeText(shareLink).catch(()=>{}); alert(t.copied)}}>
              📋 Copier le lien
            </button>
          </div>

          {/* WhatsApp button */}
          <a href={whatsappUrl} target="_blank" rel="noopener" style={{display:"block", textDecoration:"none"}}>
            <button style={{...S.primB, marginBottom:12, background:"linear-gradient(135deg,#128C7E,#25D366)", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", gap:10}}>
              <span style={{fontSize:22}}>💬</span> {t.shareWA}
            </button>
          </a>

          {/* How it works */}
          <div style={{background:"rgba(255,215,0,0.04)", border:"1px solid rgba(255,215,0,0.1)", borderRadius:14, padding:"16px"}}>
            <div style={{fontSize:12, color:gold, fontWeight:700, marginBottom:12}}>💡 Comment ça marche ?</div>
            <div style={{fontSize:13, color:"#888", lineHeight:1.8}}>
              1️⃣ {t.how1}<br/>
              2️⃣ {t.how2}<br/>
              3️⃣ <strong style={{color:gold}}>{t.how3}</strong><br/>
              4️⃣ {t.how4}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // BADGES SCREEN
  // ─────────────────────────────────────────────────────────
  if (showProfile) return (
    <div style={{...S.app, overflowY:"auto"}}>
      <style>{``}</style>
      <div style={S.glow}/>
      <div style={{maxWidth:440, margin:"0 auto", padding:"20px 16px 40px"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{color:gold,margin:0,fontSize:18}}>{t.profileTitle}</h2>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{if(window.confirm(lang==="fr"?"Se déconnecter ?":"Log out?")) logout();}}
              style={{background:"rgba(255,50,50,0.1)",border:"1px solid rgba(255,50,50,0.3)",borderRadius:8,padding:"5px 10px",color:"#FF6B6B",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
              🚪 {lang==="fr"?"Déco":"Logout"}
            </button>
            <button onClick={()=>setShowProfile(false)} style={{background:"none",border:"none",color:"#888",fontSize:24,cursor:"pointer",lineHeight:1}}>✕</button>
          </div>
        </div>

        {/* Avatar + pseudo */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:20,background:"rgba(255,215,0,0.04)",border:"1px solid rgba(255,215,0,0.12)",borderRadius:16,padding:20}}>
          <div style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#1a1a3e,#2a2a5e)",border:`3px solid ${gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:10}}>
            {player.pseudo?.[0]?.toUpperCase() || "?"}
          </div>
          {googleUser && <p style={{color:"#666",fontSize:11,margin:"0 0 8px"}}>{googleUser.email}</p>}
          {!editingPseudo ? (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:"#fff",fontWeight:700,fontSize:20}}>{player.pseudo}</span>
              <button onClick={()=>{setEditingPseudo(true);setNewPseudo(player.pseudo);}}
                style={{background:"rgba(255,215,0,0.1)",border:"1px solid rgba(255,215,0,0.3)",borderRadius:8,padding:"4px 10px",color:gold,fontSize:11,cursor:"pointer"}}>
                ✏️
              </button>
            </div>
          ) : (
            <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
              <input style={{...S.inp,textAlign:"center",fontSize:16,fontWeight:700}} value={newPseudo}
                onChange={e=>setNewPseudo(e.target.value)} maxLength={20}
                onKeyDown={e=>e.key==="Enter"&&updatePseudo()}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={updatePseudo} style={{flex:1,background:gold,border:"none",borderRadius:10,padding:"10px",color:"#000",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{t.savePseudo}</button>
                <button onClick={()=>setEditingPseudo(false)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px",color:"#888",cursor:"pointer",fontFamily:"inherit"}}>{t.back}</button>
              </div>
            </div>
          )}
          {pseudoMsg && <p style={{color:pseudoMsg.includes("✅")||pseudoMsg.includes("🔗")?"#4CAF50":"#FF4444",fontSize:12,marginTop:8}}>{pseudoMsg}</p>}
        </div>

        {/* Ranks */}
        <div style={{background:"rgba(255,215,0,0.05)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:14,padding:16,marginBottom:14}}>
          <p style={{color:gold,fontWeight:700,fontSize:13,margin:"0 0 12px"}}>🏆 {t.myRank}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"12px 8px"}}>
              <div style={{fontSize:26,fontWeight:700,color:gold}}>{playerRank.world ? `#${playerRank.world}` : "—"}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{t.worldRank}</div>
            </div>
            <div style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"12px 8px"}}>
              <div style={{fontSize:26,fontWeight:700,color:"#4FC3F7"}}>{playerRank.today ? `#${playerRank.today}` : "—"}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{t.dailyRank}</div>
            </div>
          </div>
          <button onClick={()=>{setShowProfile(false); setTimeout(()=>document.getElementById("lb-section")?.scrollIntoView({behavior:"smooth"}),200);}}
            style={{width:"100%",background:"rgba(255,215,0,0.07)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:10,padding:"9px",color:gold,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
            📊 {lang==="fr"?"Voir le classement complet":"See full leaderboard"}
          </button>
        </div>

        {/* Stats */}
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:16,marginBottom:14}}>
          <p style={{color:"#AAA",fontWeight:700,fontSize:13,margin:"0 0 12px"}}>📈 {t.myStats}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              {label:t.totalPoints, value:(lbTotal.find(r=>r.pseudo===player.pseudo)?.totalPts||0).toLocaleString(), icon:"⭐"},
              {label:t.gamesPlayed2, value:lbTotal.find(r=>r.pseudo===player.pseudo)?.gamesPlayed||0, icon:"🎮"},
              {label:"Streak", value:`${playerStreak} ${lang==="fr"?"j":"d"}`, icon:"🔥"},
              {label:t.bestLevel, value:`Niv.${currentMaxLevel}`, icon:"📖"},
            ].map((s,i) => (
              <div key={i} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"12px",textAlign:"center"}}>
                <div style={{fontSize:22}}>{s.icon}</div>
                <div style={{fontSize:18,fontWeight:700,color:"#fff",marginTop:4}}>{s.value}</div>
                <div style={{fontSize:10,color:"#666",marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Badges */}
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:16,marginBottom:14}}>
          <p style={{color:"#AAA",fontWeight:700,fontSize:13,margin:"0 0 12px"}}>🏅 {t.myBadges} ({playerBadges.length}/10)</p>
          {playerBadges.length === 0 ? (
            <p style={{color:"#555",fontSize:12,margin:0}}>{lang==="fr"?"Jouez pour débloquer des badges !":"Play to unlock badges!"}</p>
          ) : (
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {playerBadges.map(bid => {
                const bn = t.badgeNames[bid];
                return bn ? (
                  <div key={bid} title={bn[2]} style={{background:"rgba(255,215,0,0.1)",border:"1px solid rgba(255,215,0,0.3)",borderRadius:8,padding:"6px 10px",fontSize:12,color:gold}}>
                    {bn[0]} {bn[1]}
                  </div>
                ) : null;
              })}
            </div>
          )}
        </div>

        {/* Invite */}
        <div style={{background:"rgba(37,211,102,0.05)",border:"1px solid rgba(37,211,102,0.2)",borderRadius:14,padding:16}}>
          <p style={{color:"#25D366",fontWeight:700,fontSize:13,margin:"0 0 12px"}}>📲 {t.inviteFriends}</p>
          <a href={`https://wa.me/?text=${encodeURIComponent(t.shareAppMsg("https://logoschallenge.vercel.app?ref="+player.pseudo))}`}
            target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",display:"block",marginBottom:8}}>
            <button style={{width:"100%",background:"linear-gradient(135deg,#0a5c52,#128C7E)",border:"none",borderRadius:12,padding:"13px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              💬 {lang==="fr"?"Partager sur WhatsApp":"Share on WhatsApp"}
            </button>
          </a>
          <button onClick={()=>{try{navigator.clipboard.writeText("https://logoschallenge.vercel.app?ref="+player.pseudo);}catch(e){} setPseudoMsg("🔗 Lien copié !");setTimeout(()=>setPseudoMsg(""),2000);}}
            style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"11px",color:"#AAA",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
            📋 {t.copyLink}
          </button>
        </div>

      </div>
    </div>
  );

  if (showBadges) {
    const earnedIds = playerBadges;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <nav style={S.nav}>
          <button style={{background:"none",border:"none",color:gold,fontSize:16,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setShowBadges(false)}>{t.back}</button>
          <span style={{...S.navT, fontSize:15}}>🏅 Mes Badges</span>
          <div style={{width:60}}/>
        </nav>
        <div style={{padding:"20px 16px"}}>
          {player && (
            <div style={{textAlign:"center", marginBottom:24, background:"rgba(255,215,0,0.05)", border:"1px solid rgba(255,215,0,0.15)", borderRadius:16, padding:"16px"}}>
              <div style={{fontSize:13, color:gold, marginBottom:4}}>🔥 Série actuelle</div>
              <div style={{fontSize:48, fontWeight:700, color:gold}}>{playerStreak}</div>
              <div style={{fontSize:12, color:"#666"}}>jours consécutifs</div>
            </div>
          )}
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            {BADGES.map(b => {
              const earned = earnedIds.includes(b.id);
              return (
                <div key={b.id} style={{background:earned?"rgba(255,215,0,0.08)":"rgba(255,255,255,0.02)", border:`1px solid ${earned?"rgba(255,215,0,0.3)":"rgba(255,255,255,0.06)"}`, borderRadius:14, padding:"16px 12px", textAlign:"center", opacity:earned?1:0.4}}>
                  <div style={{fontSize:36, marginBottom:8}}>{b.emoji}</div>
                  <div style={{fontSize:12, fontWeight:700, color:earned?gold:"#666", marginBottom:4}}>{b.name}</div>
                  <div style={{fontSize:10, color:"#555"}}>{b.desc}</div>
                  {earned && <div style={{fontSize:9, color:"#7EC8A4", marginTop:6}}>✅ Débloqué</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────
  // LEVEL FAILED — 1st attempt, can retry
  // ─────────────────────────────────────────────────────────
  if (screen === "levelFailed") {
    const lvl = LEVELS[activeLevel - 1];
    const lp  = dailyProgress.levelProgress[activeLevel];
    const correct = lp?.correctCount || 0;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <div style={S.lcCard}>
          <span style={{fontSize:52, marginBottom:12, display:"block"}}>😔</span>
          <h2 style={{...S.lcTit, color:"#FF6B6B"}}>Niveau {activeLevel} — {lvl.name}<br/>pas encore validé</h2>
          <div style={S.lcStat}>
            <div><span style={S.lcN}>{correct}</span><span style={S.lcL}>{t.correctAnswers}</span></div>
            <div><span style={S.lcN}>{lvl.minToPass}</span><span style={S.lcL}>Minimum requis</span></div>
            <div><span style={S.lcN}>{lp?.score || 0}</span><span style={S.lcL}>Points gagnés</span></div>
          </div>
          <div style={{...S.svNot, borderColor:"rgba(255,107,107,0.3)", background:"rgba(255,107,107,0.07)", color:"#FFB3B3", marginBottom:18}}>
            {t.retryMsg1} {LEVELS[activeLevel-1].minToPass - correct} {LEVELS[activeLevel-1].minToPass - correct > 1 ? t.retryMsg3 : t.retryMsg2}. {t.retryMsg4}
          </div>
          <button className="btn-primary" style={S.primB} onClick={()=>{ 
            setDailyProgress(prev => ({...prev, levelProgress: {...prev.levelProgress, [activeLevel]: {answeredCount:0, correctCount:0, score:0, done:false}}}));
            setAskedTopics([]);
            startLevel(activeLevel); 
          }}>
            {t.retryNow}
          </button>
          <button style={S.ghstB} onClick={()=>setScreen("home")}>{t.backHome}</button>
        </div>
      </div>
    );
  }

  // LEVEL BLOCKED — 2nd attempt failed, come back tomorrow
  // ─────────────────────────────────────────────────────────
  if (screen === "levelBlocked") {
    const lvl = LEVELS[activeLevel - 1];
    const lp  = dailyProgress.levelProgress[activeLevel];
    const correct = lp?.correctCount || 0;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <div style={S.lcCard}>
          <span style={{fontSize:52, marginBottom:12, display:"block"}}>🔒</span>
          <h2 style={{...S.lcTit, color:"#888"}}>{lang==="fr" ? "Niveau" : "Level"} {activeLevel} {t.blockedTitle}</h2>
          <div style={S.lcStat}>
            <div><span style={S.lcN}>{correct}</span><span style={S.lcL}>{t.correctAnswers}</span></div>
            <div><span style={S.lcN}>{lvl.minToPass}</span><span style={S.lcL}>Minimum requis</span></div>
            <div><span style={S.lcN}>{lp?.score || 0}</span><span style={S.lcL}>Points gagnés</span></div>
          </div>
          <div style={{...S.svNot, borderColor:"rgba(255,215,0,0.2)", background:"rgba(255,215,0,0.04)", color:"#AAA", marginBottom:18}}>
            {t.blockedMsg}
          </div>
          <button className="btn-primary" style={S.primB} onClick={()=>setScreen("home")}>{t.backHome}</button>
        </div>
      </div>
    );
  }

  // SHARE SCREEN
  // ─────────────────────────────────────────────────────────
  if (showShare) {
    const shareLink = `https://logoschallenge.vercel.app${player ? "?ref="+encodeURIComponent(player.pseudo) : ""}`;
    const whatsappMsg = encodeURIComponent(t.waMsg(shareLink));
    const whatsappUrl = `https://wa.me/?text=${whatsappMsg}`;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <nav style={S.nav}>
          <button style={{background:"none",border:"none",color:gold,fontSize:16,cursor:"pointer",fontFamily:"inherit",padding:"8px 0"}} onClick={()=>setShowShare(false)}>{t.back}</button>
          <span style={{...S.navT, fontSize:15}}>{t.shareTitle}</span>
          <div style={{width:60}}/>
        </nav>
        <div style={{padding:"20px 16px"}}>

          {/* Stats parrainage */}
          <div style={{textAlign:"center", marginBottom:24, background:"rgba(255,215,0,0.05)", border:"1px solid rgba(255,215,0,0.2)", borderRadius:18, padding:"24px 16px"}}>
            <div style={{fontSize:52, marginBottom:8}}>🤝</div>
            <div style={{fontSize:13, color:gold, letterSpacing:2, textTransform:"uppercase", marginBottom:6}}>Ton impact</div>
            <div style={{fontSize:48, fontWeight:700, color:gold}}>{referralCount}</div>
            <div style={{fontSize:13, color:"#888", marginBottom:12}}>
              {referralCount === 0 ? t.noInvite : referralCount === 1 ? t.oneInvite : t.manyInvites}
            </div>
            <div style={{fontSize:13, color:"#7EC8A4", fontWeight:700}}>
              +{referralCount * 10} pts bonus gagnés 💰
            </div>
          </div>

          {/* Lien unique */}
          <div style={{background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:"16px", marginBottom:16}}>
            <div style={{fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:8}}>Ton lien unique</div>
            <div style={{fontFamily:"monospace", fontSize:12, color:"#C4A6FF", wordBreak:"break-all", marginBottom:12, background:"rgba(155,127,212,0.08)", padding:"10px 12px", borderRadius:10}}>
              {shareLink}
            </div>
            <button style={{...S.ghstB, marginBottom:0, fontSize:12}} onClick={()=>{navigator.clipboard.writeText(shareLink).catch(()=>{}); alert(t.copied)}}>
              📋 Copier le lien
            </button>
          </div>

          {/* WhatsApp button */}
          <a href={whatsappUrl} target="_blank" rel="noopener" style={{display:"block", textDecoration:"none"}}>
            <button style={{...S.primB, marginBottom:12, background:"linear-gradient(135deg,#128C7E,#25D366)", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center", gap:10}}>
              <span style={{fontSize:22}}>💬</span> {t.shareWA}
            </button>
          </a>

          {/* How it works */}
          <div style={{background:"rgba(255,215,0,0.04)", border:"1px solid rgba(255,215,0,0.1)", borderRadius:14, padding:"16px"}}>
            <div style={{fontSize:12, color:gold, fontWeight:700, marginBottom:12}}>💡 Comment ça marche ?</div>
            <div style={{fontSize:13, color:"#888", lineHeight:1.8}}>
              1️⃣ {t.how1}<br/>
              2️⃣ {t.how2}<br/>
              3️⃣ <strong style={{color:gold}}>{t.how3}</strong><br/>
              4️⃣ {t.how4}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // BADGES SCREEN
  // ─────────────────────────────────────────────────────────
  if (showBadges) {
    const earnedIds = playerBadges;
    return (
      <div style={S.app}>
        <style>{``}</style>
        <div style={S.glow}/>
        <nav style={S.nav}>
          <button style={{background:"none",border:"none",color:gold,fontSize:16,cursor:"pointer",fontFamily:"inherit",padding:"8px 0"}} onClick={()=>setShowBadges(false)}>{t.back}</button>
          <span style={{...S.navT, fontSize:15}}>🏅 Mes Badges</span>
          <div style={{width:60}}/>
        </nav>
        <div style={{padding:"20px 16px"}}>
          {player && (
            <div style={{textAlign:"center", marginBottom:24, background:"rgba(255,215,0,0.05)", border:"1px solid rgba(255,215,0,0.15)", borderRadius:16, padding:"16px"}}>
              <div style={{fontSize:13, color:gold, marginBottom:4}}>🔥 Série actuelle</div>
              <div style={{fontSize:48, fontWeight:700, color:gold}}>{playerStreak}</div>
              <div style={{fontSize:12, color:"#666"}}>jours consécutifs</div>
            </div>
          )}
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            {BADGES.map(b => {
              const earned = earnedIds.includes(b.id);
              return (
                <div key={b.id} style={{background:earned?"rgba(255,215,0,0.08)":"rgba(255,255,255,0.02)", border:`1px solid ${earned?"rgba(255,215,0,0.3)":"rgba(255,255,255,0.06)"}`, borderRadius:14, padding:"16px 12px", textAlign:"center", opacity:earned?1:0.4}}>
                  <div style={{fontSize:36, marginBottom:8}}>{b.emoji}</div>
                  <div style={{fontSize:12, fontWeight:700, color:earned?gold:"#666", marginBottom:4}}>{b.name}</div>
                  <div style={{fontSize:10, color:"#555"}}>{b.desc}</div>
                  {earned && <div style={{fontSize:9, color:"#7EC8A4", marginTop:6}}>✅ Débloqué</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // HOME
  // ─────────────────────────────────────────────────────────
  const dp = dailyProgress;
  const displayLb = lbTab === "today" ? lbToday : lbTotal;

  return (
    <div style={S.app}>
      <style>{``}</style>
      <div style={S.glow}/>
      <nav style={S.nav}>
        <div style={S.navL}>
          <span style={S.navT}>✝ LOGOS</span><span style={{...S.navT, color:"#fff", fontSize:16, fontFamily:"'Nunito',sans-serif", fontWeight:900, letterSpacing:-0.5}}>CHALLENGE</span>
          <span style={S.navS}>{t.tagline}</span>
        </div>
        <div style={{display:"flex", gap:8, alignItems:"center"}}>
          <button onClick={toggleLang} style={{background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:20, padding:"6px 12px", color:"#CCC", cursor:"pointer", fontSize:13, fontFamily:"inherit", fontWeight:700}}>
            {lang === "fr" ? "🇬🇧 EN" : "🇫🇷 FR"}
          </button>
          {player ? (
            <>
              {playerStreak > 0 && (
                <div style={{background:"rgba(255,107,53,0.15)", border:"1px solid rgba(255,107,53,0.4)", borderRadius:12, padding:"5px 10px", fontSize:12, color:"#FF6B35", fontWeight:700}}>
                  🔥 {playerStreak}j
                </div>
              )}
              <div className="nav-chip" style={S.chip} onClick={openProfile}>
                <div style={S.chipN}>{player.pseudo} {playerBadges.length > 0 && <span style={{fontSize:10}}>🏅{playerBadges.length}</span>}</div>
                <div style={S.chipS}>⭐ {dp.todayTotalScore} {t.ptsToday}</div>
              </div>
            </>
          ) : (
            <button onClick={()=>setScreen("register")} style={S.joinB}>
              {t.join}
            </button>
          )}
        </div>
      </nav>

      <div style={{display:"flex", justifyContent:"center", marginTop:16}}>
        <div style={{...S.aiBdg, fontSize:13, padding:"8px 18px"}}>
          <span style={{fontSize:11}}>✦</span> {t.aiTag}
        </div>
      </div>

      {/* SHARE BUTTON — visible to logged-in players */}
      {player && (
        <div style={{margin:"12px 16px 0", display:"flex", gap:10}}>
          <button onClick={()=>setShowShare(true)} style={{flex:1, background:"linear-gradient(135deg,#0a5c52,#128C7E)", border:"1px solid rgba(37,211,102,0.3)", borderRadius:14, padding:"12px 16px", color:"#FFF", cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8}}>
            <span style={{fontSize:20}}>💬</span>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:13, fontWeight:700}}>{t.inviteBtn}</div>
              <div style={{fontSize:10, color:"rgba(255,255,255,0.6)"}}>{t.inviteSub} · {referralCount} {referralCount !== 1 ? t.inviteds : t.invited}</div>
            </div>
          </button>
        </div>
      )}

      

      <div style={S.secT}>{t.dailyChallenge}</div>
      <div style={S.pathW} className="card-hover">
        <div style={S.pathH}>
          <span style={S.pathT}>🌅 {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</span>
          <span style={S.cdBdg}>⏰ {countdown}</span>
        </div>
        <div style={S.todS} className="slide-up">
          <span style={{...S.todN, background:`linear-gradient(135deg,${gold2},${gold})`, WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>{dp.todayTotalScore}</span>
          <span style={S.todL}>{t.ptsToday2}</span>
        </div>

        {LEVELS.map(lvl => {
          const lp         = dp.levelProgress[lvl.id] || { answeredCount:0, score:0, done:false };
          const isUnlocked = lvl.id <= (dp.currentLevel || 1);
          const isDone     = lp.done;
          const isActive   = lvl.id === dp.currentLevel && !isDone;
          const pct        = isDone ? 100 : (lp.answeredCount / lvl.questionsPerDay * 100);

          let borderColor = "rgba(255,255,255,0.06)";
          let bgColor     = "rgba(255,255,255,0.02)";
          let statusColor = "rgba(255,255,255,0.2)";
          let statusText  = "🔒";
          let cursor      = "default";

          const attempts = levelAttempts[lvl.id] || 0;
          const isBlocked = !isDone && isUnlocked && attempts >= 2;
          if (isDone)         { borderColor=lvl.color+"44"; bgColor=lvl.color+"0d"; statusColor="#7EC8A4"; statusText=t.done; }
          else if (isBlocked) { borderColor="rgba(255,100,100,0.3)"; bgColor="rgba(255,100,100,0.05)"; statusColor="#FF6B6B"; statusText=t.tomorrow; }
          else if (isActive)  { borderColor=lvl.color+"88"; bgColor=lvl.color+"18"; statusColor=lvl.color; statusText=lp.answeredCount>0?t.resume:t.play; cursor="pointer"; }
          else if (isUnlocked){ borderColor=lvl.color+"33"; statusColor=lvl.color; statusText=t.available; cursor="pointer"; }

          return (
            <div key={lvl.id} className={`level-card ${isActive?"active-level":""}`} style={{...S.lvlSt, background:bgColor, borderColor, opacity:isUnlocked?1:0.3, cursor}}
              onClick={()=>{ if(!isUnlocked||isDone||isBlocked) return; if(!player){setScreen("register");return;} startLevel(lvl.id); }}>
              <span style={S.stIco}>{lvl.emoji}</span>
              <div style={S.stInf}>
                <div style={S.stNm}>Niv.{lvl.id} — {lvl.name}</div>
                <div style={S.stSb}>{lvl.desc} · ✅ {lvl.minToPass}/{lvl.questionsPerDay} {t.minToPass} · ⏱ {lvl.timeLimit}s</div>
                {isUnlocked && (
                  <div style={S.pBar}>
                    <div style={{...S.pFill, width:`${pct}%`, background:isDone?"#7EC8A4":lvl.color}}/>
                  </div>
                )}
              </div>
              <span style={{...S.stSt, color:statusColor}}>{statusText}</span>
            </div>
          );
        })}

        {!player && (
          <div style={{textAlign:"center",marginTop:14,padding:"14px",background:"rgba(255,215,0,0.04)",border:"1px solid rgba(255,215,0,0.12)",borderRadius:12}}>
            <p style={{fontSize:13,color:"#777",marginBottom:10}}>{t.registerPrompt}</p>
            <button style={{...S.primB,width:"auto",display:"inline-block",padding:"10px 24px",margin:0}} onClick={()=>setScreen("register")}>{t.createProfile}</button>
          </div>
        )}
      </div>

      <div id="lb-section" style={S.secT}>{t.leaderboard} {saving && "💾"}</div>
      <div style={S.lbW}>
        <div style={S.lbTbs}>
          <button onClick={()=>setLbTab("today")} style={{...S.lbTb, background:lbTab==="today"?"rgba(99,202,183,0.12)":"transparent", color:lbTab==="today"?"#63CAB7":"rgba(255,255,255,0.3)"}}>
            {t.todayBest}
          </button>
          <button onClick={()=>setLbTab("total")} style={{...S.lbTb, background:lbTab==="total"?"rgba(99,202,183,0.12)":"transparent", color:lbTab==="total"?"#63CAB7":"rgba(255,255,255,0.3)"}}>
            {t.worldBest}
          </button>
        </div>

        {lbLoading && lbToday.length === 0 && lbTotal.length === 0 ? (
          <div style={{textAlign:"center",padding:"20px",color:"#444",fontSize:13}}>{t.loadingLb}</div>
        ) : displayLb.length === 0 ? (
          <div style={{textAlign:"center",padding:"20px",color:"#444",fontSize:13}}>{t.noPlayers}</div>
        ) : displayLb.slice(0,10).map((p,i) => {
          const pts  = lbTab==="today" ? p.todayPts : p.totalPts;
          const isMe = player && p.pseudo === player.pseudo;
          return (
            <div key={p.pseudo+i} style={{...S.lbRw, background:isMe?"rgba(255,215,0,0.07)":i<3?"rgba(255,255,255,0.03)":"transparent"}}>
              <span style={{...S.lbRk, color:i===0?gold:i===1?"#C0C0C0":i===2?"#CD7F32":"#444"}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
              </span>
              <span style={{flex:1, fontWeight:700, fontSize:13}}>
                {p.pseudo}
                {isMe && <span style={{background:"rgba(255,215,0,0.18)",color:gold,fontSize:9,padding:"1px 5px",borderRadius:6,marginLeft:5}}>{t.you}</span>}
              </span>
              <span style={{fontSize:14}}>{"🌱📖✝️🔥⭐👑"[(p.highestLevel||1)-1]}</span>
              <span style={{fontWeight:700, fontSize:13, color:gold}}>{(pts||0).toLocaleString()} pts</span>
            </div>
          );
        })}
        <p style={{textAlign:"center",fontSize:11,color:"#333",marginTop:10}}>
          {t.lbRealtime}
        </p>
      </div>


      

      <div style={{margin:"20px 16px 0", background:"rgba(255,215,0,0.04)", border:"1px solid rgba(255,215,0,0.15)", borderRadius:16, padding:"20px 18px", textAlign:"center"}}>
        <div style={{fontSize:11, color:gold, letterSpacing:3, textTransform:"uppercase", marginBottom:12, fontWeight:700}}>{t.versetTitle}</div>
        {player && <div style={{fontSize:12, color:"#9B7FD4", marginBottom:10}}>{t.versetFor} <strong style={{color:gold}}>{player.pseudo}</strong> 🙏</div>}
        <p style={{fontSize:15, color:"#CCC", lineHeight:1.8, fontStyle:"italic", marginBottom:10}}>"{getVerset(lang).text}"</p>
        <span style={{fontSize:13, color:gold, fontWeight:700}}>— {getVerset(lang).ref}</span>
      </div>

            <div style={S.footer}>"Ta parole est une lampe à mes pieds." — Psaume 119:105</div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LogosChallenge />);
  </script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
